          }, previewUrl ? '📷 Change photo' : '📷 Upload photo')

      h('label', { className: 'field' },
        h('span', { className: 'field-label' }, 'Name'),

      h('label', { className: 'field' },

      h('div', { className: 'field' },
        h('span', { className: 'field-label', style: { display: 'block', marginBottom: 8 } }, 'Genres You Like'),

function FriendView({ friends, shows, currentUser, selectedId, setSelectedId, onAddTickets, onEditProfile, onRemoveFriend }) {
  const friend = friends.find((f) => f.id === selectedId);
  if (!friend) return h('div', { className: 'empty-state' }, h('h3', null, 'Pick a friend'), h('p', null, 'Or create a profile to get started'));

  const myShows = shows.filter((s) => s.tickets.some((t) => t.friend_id === friend.id && t.count > 0));
  const upcoming = myShows.filter((s) => !s.past).sort((a, b) => (a.date || '').localeCompare(b.date || ''));
  const past = myShows.filter((s) => s.past).sort((a, b) => (b.date || '').localeCompare(a.date || ''));

    }
  }, [expanded]);

  return h('div', { className: 'friend-row' + (show.past ? ' past-row' : ''), style: { flexDirection: 'column', alignItems: 'stretch', cursor: 'pointer', gap: 0 }, onClick: () => setExpanded(!expanded) },
    h('div', { style: { display: 'flex', alignItems: 'center', gap: 10 } },
      h(ArtistPhoto, { artist: show.artist, imgUrl: show.artist_image_url || null, style: { width: 34, height: 34, borderRadius: 8, flexShrink: 0 } }),
      h('div', { style: { flex: 1, minWidth: 0 } },
        h('div', { style: { fontWeight: 500, fontSize: 14 } }, show.artist),
        h('div', { style: { fontSize: 11, color: '#999', fontFamily: 'JetBrains Mono, monospace', letterSpacing: '0.05em' } },
          (show.venue || 'TBD') + ' · ' + formatDate(show.date)
        )
      ),
      myReact && h('span', { style: { fontSize: 14 } }, myReact.vote === 1 ? '👍' : '👎'),
      h('span', { className: 'chip ' + (t.count >= 2 ? 'chip-vip' : 'chip-1') }, t.count + ' tix'),
      h('span', { style: { fontSize: 12, color: '#999', marginLeft: 4 } }, expanded ? '▲' : '▼'),
    ),
    expanded && h('div', { style: { marginTop: 12, borderTop: '1px solid rgba(0,0,0,0.06)', paddingTop: 12 }, onClick: e => e.stopPropagation() },
      h('div', { style: { fontSize: 12, color: '#666', marginBottom: 8 } },
        h('strong', null, 'Going: '),
        going.map(t => { const f = friendsById[t.friend_id]; return f ? f.name + (t.count > 1 ? ` ×${t.count}` : '') : null; }).filter(Boolean).join(', ') || 'No one yet'
      ),
      !show.past && (show.crowdvolt_url || show.dice_url) && h('div', { style: { display: 'flex', flexDirection: 'column', gap: 4 } },
        show.crowdvolt_url && h('a', {
          className: 'get-tickets-btn', href: show.crowdvolt_url, target: '_blank', rel: 'noopener noreferrer',
          onClick: e => e.stopPropagation(),
        },
          h('img', { src: 'https://www.crowdvolt.com/favicon.ico', alt: '', onError: e => { e.target.style.display = 'none'; } }),
          'Crowdvolt',
          ticketPrice && h('span', { className: 'get-tickets-price' }, `· from $${Number.isInteger(ticketPrice) ? ticketPrice : ticketPrice.toFixed(2)} excl. fees`),
        ),
        show.dice_url && h('a', {
          className: 'get-tickets-btn', href: show.dice_url, target: '_blank', rel: 'noopener noreferrer',
          onClick: e => e.stopPropagation(),
        },
          h('img', { src: 'https://dice.fm/favicon.ico', alt: '', onError: e => { e.target.style.display = 'none'; } }),
          'Dice',
          dicePrice && h('span', { className: 'get-tickets-price' }, `· from $${Number.isInteger(dicePrice) ? dicePrice : dicePrice.toFixed(2)}`),
        ),
      )
    )
  );
}

// ===== Add tickets modal =====
function AddTicketsModal({ friendId, showId, friends, shows, currentUser, onClose, onSave }) {
  const allShows = [...shows].filter(s => !s.past).sort((a, b) => (a.date || '').localeCompare(b.date || ''));
  const [selFriendId, setSelFriendId] = useState(friendId || currentUser?.id || friends[0]?.id);
  const [selShowId, setSelShowId] = useState(showId ?? allShows[0]?.id ?? null);
  const [count, setCount] = useState(1);
  const [saving, setSaving] = useState(false);
  const selFriend = friends.find(f => f.id === selFriendId);

  const submit = async () => {
    if (!selShowId || !selFriendId) return;
    setSaving(true);
    await onSave(selShowId, selFriendId, count);
  };

  return h('div', { className: 'modal-overlay', onClick: e => { if (e.target === e.currentTarget) onClose(); } },
    h('div', { className: 'modal', style: { maxWidth: 400 } },
      h('p', { className: 'modal-sub' }, 'add tickets'),
      h('h2', { className: 'modal-title', style: { marginTop: 4, marginBottom: 20 } }, selFriend ? 'Tickets for ' + selFriend.name : 'Add tickets'),
      h('label', { className: 'field' },
        h('span', { className: 'field-label' }, 'Friend'),
        h('select', { value: selFriendId || '', onChange: e => setSelFriendId(parseInt(e.target.value)) },
          friends.map(f => h('option', { key: f.id, value: f.id }, f.name + (currentUser?.id === f.id ? ' (you)' : '')))
        )
      ),
      h('label', { className: 'field' },
        h('span', { className: 'field-label' }, 'Show'),
        h('select', { value: selShowId || '', onChange: e => setSelShowId(parseInt(e.target.value)) },
          allShows.map(s => h('option', { key: s.id, value: s.id }, formatDate(s.date) + ' · ' + s.artist))
        )
      ),
      h('div', { className: 'stepper' },
        h('button', { className: 'stepper-btn', onClick: () => setCount(Math.max(1, count - 1)), disabled: count <= 1 }, '−'),
        h('div', { style: { textAlign: 'center' } },
          h('div', { className: 'stepper-count' }, count),
          h('div', { style: { fontSize: 10, color: '#666', textTransform: 'uppercase', letterSpacing: '0.15em', fontFamily: 'JetBrains Mono, monospace', marginTop: 4 } }, count === 1 ? 'ticket' : 'tickets')
        ),
        h('button', { className: 'stepper-btn', onClick: () => setCount(count + 1) }, '+')
      ),
      h('div', { style: { display: 'flex', justifyContent: 'flex-end', gap: 8 } },
        h('button', { className: 'ghost-btn', onClick: onClose }, 'Cancel'),
        h('button', { className: 'primary-btn', onClick: submit, disabled: saving || !selShowId }, saving ? 'Saving...' : 'Save')
      )
    )
  );
}

// ===== Edit show modal =====
function EditShowModal({ show, onClose, onSave }) {
  const [date, setDate] = useState(show?.date || '');
  const [artist, setArtist] = useState(show?.artist || '');
  const [venue, setVenue] = useState(show?.venue || '');
  const [note, setNote] = useState(show?.note || '');
  const [crowdvoltUrl, setCrowdvoltUrl] = useState(show?.crowdvolt_url || '');
  const [diceUrl, setDiceUrl] = useState(show?.dice_url || '');
  const [saving, setSaving] = useState(false);
  const [refreshing, setRefreshing] = useState(false);
  if (!show) return null;

  const submit = async () => {
    if (!artist.trim()) return;
    setSaving(true);
    await onSave({ date: date || null, artist: artist.trim(), venue: venue.trim() || null, note: note.trim() || null, crowdvolt_url: crowdvoltUrl.trim() || null, dice_url: diceUrl.trim() || null });
  };

  const refreshImage = async () => {
    setRefreshing(true);
    try {
      // Re-run the fetch in the same Crowdvolt-first order, then save the result.
      const tryFetch = (url) => fetch(`/api/fetch-og-image?url=${encodeURIComponent(url)}`).then(r => r.json()).then(d => d.image || null).catch(() => null);
      let imageUrl = show.crowdvolt_url ? await tryFetch(show.crowdvolt_url) : null;
      if (!imageUrl && show.dice_url) imageUrl = await tryFetch(show.dice_url);
      attemptedImageFetches.delete(show.id);
      await sb.from('shows').update({ artist_image_url: imageUrl || '' }).eq('id', show.id);
    } finally {
      setRefreshing(false);
    }
  };

  return h('div', { className: 'modal-overlay', onClick: e => { if (e.target === e.currentTarget) onClose(); } },
    h('div', { className: 'modal' },
      h('p', { className: 'modal-sub' }, 'edit show'),
      h('h2', { className: 'modal-title', style: { marginTop: 4, marginBottom: 20 } }, show.artist),
      h('label', { className: 'field' },
        h('span', { className: 'field-label' }, 'Date'),
        h('input', { type: 'date', value: date, onChange: e => setDate(e.target.value) })
      ),
      h('label', { className: 'field' },
        h('span', { className: 'field-label' }, 'DJ / artist *'),
        h('input', { type: 'text', value: artist, onChange: e => setArtist(e.target.value) })
      ),
      h('label', { className: 'field' },
        h('span', { className: 'field-label' }, 'Venue'),
        h('input', { type: 'text', value: venue, onChange: e => setVenue(e.target.value) })
      ),
      h('label', { className: 'field' },
        h('span', { className: 'field-label' }, 'Note'),
        h('input', { type: 'text', value: note, onChange: e => setNote(e.target.value) })
      ),
      h('div', { className: 'field' },
        h('span', { className: 'field-label', style: { display: 'block', marginBottom: 6 } }, 'CrowdVolt event link (optional)'),
        h('input', { type: 'url', value: crowdvoltUrl, onChange: e => setCrowdvoltUrl(e.target.value), placeholder: 'https://www.crowdvolt.com/event/...' }),
      ),
      h('div', { className: 'field' },
        h('span', { className: 'field-label', style: { display: 'block', marginBottom: 6 } }, 'Dice event link (optional)'),
        h('input', { type: 'url', value: diceUrl, onChange: e => setDiceUrl(e.target.value), placeholder: 'https://dice.fm/event/...' }),
      ),
      h('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: 8, marginTop: 8 } },
        h('button', { className: 'ghost-btn', onClick: refreshImage, disabled: refreshing || saving || (!show.crowdvolt_url && !show.dice_url), title: 'Re-fetch the artist image (Crowdvolt first, then Dice)' }, refreshing ? 'Refreshing…' : '↻ Refresh image'),
        h('div', { style: { display: 'flex', gap: 8 } },
          h('button', { className: 'ghost-btn', onClick: onClose }, 'Cancel'),
          h('button', { className: 'primary-btn', onClick: submit, disabled: saving || !artist.trim() }, saving ? 'Saving...' : 'Save')
        )
      )
    )
  );
}

createRoot(document.getElementById('root')).render(h(App));
</script>
<script>
(function scatterBalls(){
  const host = document.getElementById('ballScatter');
  if (!host) return;
  let seed = 1337;
  const rand = () => { seed = (seed * 9301 + 49297) % 233280; return seed / 233280; };
  const render = () => {
    host.innerHTML = '';
    const W = window.innerWidth, H = Math.max(window.innerHeight, document.body.scrollHeight);
    const points = [], minDist = 140, target = Math.round((W * H) / 42000);
    let tries = 0;
    seed = 1337;
    while (points.length < target && tries < target * 40) {
      tries++;
      const x = rand() * W, y = rand() * H;
      let ok = true;
      for (const p of points) { const dx = p.x - x, dy = p.y - y; if (dx*dx + dy*dy < minDist*minDist) { ok = false; break; } }
      if (ok) points.push({ x, y });
    }
    const frag = document.createDocumentFragment();
    for (const p of points) {
      const size = 40 + Math.floor(rand() * 90), rot = Math.floor(rand() * 360), tilt = (rand() - 0.5) * 20;
      const el = document.createElement('div');
      el.className = 'ball';
      el.style.cssText = `left:${p.x - size/2}px;top:${p.y - size/2}px;width:${size}px;height:${size}px;transform:rotate(${rot}deg) skew(${tilt}deg)`;
      frag.appendChild(el);
    }
    host.appendChild(frag);
  };
  render();
  let t;
  window.addEventListener('resize', () => { clearTimeout(t); t = setTimeout(render, 120); });
})();
</script>
